<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MahmudGPT PROMIX+</title>
    <script>
      window.global = window;
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && desc.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked fetch overwrite attempt'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error('Failed to protect fetch:', e);
        }
      })();
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('fetch')) {
          console.warn('Caught fetch assignment error:', e.message);
          e.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
